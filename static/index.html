<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS2 战术本</title>
    <style>
      /* Critical CSS — auth gate first paint */
      :root{--bg:#f4f1ec;--panel:#fff;--ink:#18211d;--muted:#6e7a73;--line:#e2dfd9;--radius:10px;--accent:#1f8f74;--shadow:0 4px 12px rgba(24,33,29,.08)}
      *,*::after,*::before{margin:0;padding:0;box-sizing:border-box}
      body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh}
      .hidden{display:none!important}
      .auth-gate{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
      .auth-panel{display:grid;gap:18px;width:min(380px,100%);padding:36px 32px;background:var(--panel);border-radius:16px;box-shadow:var(--shadow)}
      .auth-brand{display:flex;align-items:center;gap:12px}
      .auth-brand h1{font-size:22px;font-weight:800;line-height:1.3}
      .auth-brand p{font-size:13px;color:var(--muted)}
      .brand-mark{display:flex;gap:4px}.brand-mark span{width:8px;height:22px;border-radius:3px}
      .brand-mark span:nth-child(1){background:var(--accent)}.brand-mark span:nth-child(2){background:#df6a3f}.brand-mark span:nth-child(3){background:#3780c2}
      .field{display:grid;gap:5px;font-size:14px;font-weight:600}.field input{padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);font-size:15px;background:var(--bg);transition:border-color .15s}
      .field input:focus{outline:none;border-color:var(--accent)}
      .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:1px solid var(--line);border-radius:var(--radius);font:inherit;font-size:14px;font-weight:700;cursor:pointer;background:var(--panel);transition:all .15s}
      .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
      .login-hint{font-size:13px;color:#c0392b;min-height:1.4em}
    </style>
    <link rel="stylesheet" href="/static/styles.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="/static/styles.css" /></noscript>
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <section id="authGate" class="auth-gate">
      <form id="loginForm" class="auth-panel">
        <div class="brand auth-brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>CS2 战术本</h1>
            <p>输入密钥后继续</p>
          </div>
        </div>
        <label class="field">
          <span>访问密钥</span>
          <input id="accessKeyInput" type="password" autocomplete="current-password" autofocus />
        </label>
        <button class="btn primary" type="submit">登录</button>
        <p id="loginHint" class="login-hint"></p>
      </form>
    </section>

    <div id="appShell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>CS2 战术本</h1>
            <p>Python · SQLite</p>
          </div>
        </div>

        <div class="map-actions">
          <button class="btn primary" type="button" data-action="open-map-modal" data-mode="create">新增地图</button>
        </div>

        <div id="mapList" class="map-list" aria-label="地图池"></div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">当前地图</p>
            <h2 id="currentMapName">未选择</h2>
          </div>
          <div class="topbar-actions">
            <button class="btn ghost" type="button" data-action="download-export" data-format="docx">下载 Word</button>
            <button class="btn ghost" type="button" data-action="download-export" data-format="pdf">下载 PDF</button>
            <button class="btn ghost" type="button" data-action="logout">退出登录</button>
            <button class="btn ghost" type="button" data-action="open-map-modal" data-mode="edit">重命名</button>
            <button class="btn danger" type="button" data-action="delete-map">删除地图</button>
          </div>
        </header>

        <nav id="tabs" class="tabs" aria-label="战术分区"></nav>
        <section id="content" class="content"></section>
      </main>
    </div>

    <div id="mapModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="mapModalTitle">
      <div class="modal-panel">
        <div class="modal-head">
          <h3 id="mapModalTitle">新增地图</h3>
          <button class="icon-btn" type="button" data-action="close-map-modal" aria-label="关闭">×</button>
        </div>
        <label class="field">
          <span>地图名称</span>
          <input id="mapNameInput" type="text" maxlength="60" autocomplete="off" />
        </label>
        <div class="modal-actions">
          <button class="btn ghost" type="button" data-action="close-map-modal">取消</button>
          <button class="btn primary" type="button" data-action="save-map">保存</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  </body>
</html>
